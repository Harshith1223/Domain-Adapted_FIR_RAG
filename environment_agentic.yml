name: agentic
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy
  - pandas
  - scikit-learn
  - matplotlib
  - seaborn
  - jupyter
  - ipykernel
  - tqdm
  - pyyaml
  - faiss-cpu
  - pytorch
  - torchvision
  - torchaudio
  #- pytorch-cuda=11.8  # for GPU
  - pip:
      # Core LLM stack
      - transformers>=4.40
      - datasets
      - sentencepiece
      - accelerate

      # Fine-tuning & efficiency
      - peft
      - bitsandbytes

      # Retrieval
      - sentence-transformers

      # Agentic frameworks (local-only)
      - langchain
      - langchain-community

      # Evaluation
      - sacrebleu
      - rouge-score
      - nltk

      # Indic language utilities
      - indic-nlp-library

      # System tools
      - psutil
